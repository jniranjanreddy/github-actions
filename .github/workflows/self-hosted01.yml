name: Self Hosted Example

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a simple command
        run: echo "Hello from self-hosted runner!"

      - name: Show system info
        run: |
          uname -a
          whoami
